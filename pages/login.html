<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/index.css">
    <title>EduSegura - Plataforma de Educação Digital</title>
</head>

<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">🎓 EduSegura</a>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="login.html" class="ativo">Entrar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="pagina-form">
            <div class="caixa-form">
                <h1>Bem-vindo de volta</h1>
                <p class="subtitulo">Acesse sua conta para continuar aprendendo</p>

                <form class="form-stack" action="#" method="post">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required />
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required />
                    </div>

                    <p class="esqueceu"><a href="#">Esqueci minha senha</a></p>

                    <button type="submit" class="btn btn-primary btn-form">Entrar</button>
                </form>

                <p class="link-form">Não tem conta? <a href="cadastro.html">Criar conta grátis</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>
            @ <span id="ano"></span>
            <span>EduSegura</span>
            - UNIPLAN | Projeto Integrado Multidisciplinar
        </p>
    </footer>

    <script>
        document.getElementById('ano').textContent = new Date().getFullYear();
    </script>
</body>

</html>
